server:
  port: 8083

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
    username: postgres
    password: ${DB_PASSWORD}
  liquibase:
    change-log: classpath:db/master.xml
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 2
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

gateway:
  secret: ${GATEWAY_SECRET:}

logging:
  file:
    name: logs/app.log