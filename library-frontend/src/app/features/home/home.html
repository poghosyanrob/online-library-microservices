<div class="home-container">

  <header class="home-header">
    <div class="logo-section">
      <h2>📚 {{ 'APP.TITLE' | translate }}</h2>
    </div>
    <div class="nav-links">
      <app-lang-switcher></app-lang-switcher>
    </div>
    <div class="user-section">
      <button *ngIf="!isLoggedIn()" (click)="onLogin()" class="login-header-btn">{{ 'AUTH.LOGIN.SUBMIT' | translate }}</button>
      <button *ngIf="isLoggedIn()" (click)="goToDashboard()" class="login-header-btn">{{ 'NAV.DASHBOARD' | translate }}</button>
    </div>
  </header>

  <main class="home-content">

    <div class="home-hero">
      <h1>{{ 'HOME.HERO_TITLE' | translate }}</h1>
      <p>{{ 'HOME.HERO_SUBTITLE' | translate }}</p>
    </div>

    <div class="search-bar-wrap">
      <input
        type="text"
        class="search-input"
        [(ngModel)]="searchQuery"
        (input)="onSearchInput()"
        [placeholder]="'🔍 ' + ('SEARCH.PLACEHOLDER' | translate)"
      />
    </div>

    <div *ngIf="loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>{{ 'APP.LOADING' | translate }}</p>
    </div>

    <div *ngIf="errorMessage && !loading" class="error-banner">{{ errorMessage | translate }}</div>

    <div *ngIf="books.length === 0 && !loading && !errorMessage" class="empty-state">
      <p>{{ 'SEARCH.NO_RESULTS' | translate }}</p>
    </div>

    <div class="book-cards-grid" *ngIf="books.length > 0 && !loading">
      <div class="book-card" *ngFor="let book of books">
        <div class="book-card-image">
          <img *ngIf="getImageUrl(book)" [src]="getImageUrl(book)" [alt]="book.title" />
          <div *ngIf="!getImageUrl(book)" class="book-card-placeholder">📖</div>
        </div>
        <div class="book-card-body">
          <h4 class="book-card-title">{{ book.title }}</h4>
          <p class="book-card-author">{{ book.author }}</p>
          <div class="book-card-footer">
            <span class="book-card-price">${{ book.price }}</span>
            <button
              class="book-card-order-btn"
              [class.out-of-stock]="book.quantity === 0"
              [disabled]="book.quantity === 0"
              (click)="onOrder(book)">
              {{ book.quantity === 0 ? ('BOOKS.OUT_OF_STOCK' | translate) : ('🛒 ' + ('BOOKS.ORDER' | translate)) }}
            </button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>
