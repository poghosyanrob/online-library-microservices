server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 2
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false
            - AddRequestHeader=X-Gateway-Secret, ${GATEWAY_SECRET}

          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL:http://user-service:8083}
              predicates:
                - Path=/api/user/**

            - id: admin-service
              uri: ${USER_SERVICE_URL:http://user-service:8083}
              predicates:
                - Path=/api/admin/**
              filters:
                - name: AuthenticationFilter

            - id: book-service-public
              uri: ${BOOK_SERVICE_URL:http://book-service:8081}
              predicates:
                - Path=/api/books/**
                - Method=GET

            - id: book-service
              uri: ${BOOK_SERVICE_URL:http://book-service:8081}
              predicates:
                - Path=/api/books/**
              filters:
                - name: AuthenticationFilter

            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://order-service:8082}
              predicates:
                - Path=/api/orders/**
              filters:
                - name: AuthenticationFilter

jwt:
  secret: ${JWT_SECRET:}

logging:
  file:
    name: logs/app.log