spring:
  application:
    name: book-service
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/book_db}
    username: postgres
    password: ${DB_PASSWORD}
  liquibase:
    change-log: classpath:db/master.xml
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: book-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: org.example.bookservice.event.OrderPlacedEvent
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
server:
  port: 8081
app:
  upload:
    dir: ${UPLOAD_DIR:uploads/books}
gateway:
  secret: ${GATEWAY_SECRET}

logging:
  file:
    name: logs/app.log
  level:
    org:
      apache:
        kafka: WARN